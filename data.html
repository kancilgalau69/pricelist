<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PBS Reseller — Data</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #0b1220;
      --bg-2: #0d1b2d;
      --card: rgba(255,255,255,.04);
      --card-strong: rgba(255,255,255,.07);
      --border: rgba(255,255,255,.12);
      --text: #e8edf5;
      --muted: #9fb1ca;
      --accent: #0bd1a4;
      --accent-2: #38bdf8;
      --shadow: 0 18px 45px rgba(0,0,0,.28);
    }
    [data-theme="light"]{
      --bg: #f4f6fb;
      --bg-2: #e7ecf6;
      --card: rgba(255,255,255,.9);
      --card-strong: #fff;
      --border: rgba(15,23,42,.09);
      --text: #0f172a;
      --muted: #5b6476;
      --accent: #0ea5e9;
      --accent-2: #22c55e;
      --shadow: 0 14px 32px rgba(15,23,42,.08);
    }

    body{
      font-family: 'Manrope', sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(14,165,233,.16), transparent 35%),
                  radial-gradient(circle at 80% 0%, rgba(34,197,94,.16), transparent 28%),
                  linear-gradient(135deg, var(--bg), var(--bg-2));
      color: var(--text);
      min-height: 100vh;
    }

    .nav-glass{
      background: linear-gradient(120deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 14px 18px;
    }

    .glass{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .glass-strong{
      background: var(--card-strong);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .muted{color:var(--muted)!important;}
    label, .form-label, .form-text { color: var(--text) !important; }

    .pill{
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      font-size: 12px;
      color: var(--muted);
    }

    .badge-soft{
      background: rgba(11,209,164,.16);
      border: 1px solid rgba(11,209,164,.28);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 600;
    }

    .btn-ghost{
      border-color: var(--border);
      color: var(--text);
      background: rgba(255,255,255,.02);
    }

    .btn-accent{
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      border: none;
      color: #001018;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(34,197,94,.25);
    }
    [data-theme="light"] .btn-accent{ color: #fff; }

    .form-control,.form-select{
      background:transparent!important; color:var(--text)!important; border-color:var(--border)!important; border-radius:12px;
    }
    .form-control::placeholder{ color: rgba(163,163,163,.9); }
    .table > :not(caption) > * > *{background:transparent!important; color:var(--text)!important; border-color:var(--border)!important; vertical-align: middle;}
    .table-hover tbody tr:hover td{ background: rgba(255,255,255,.02) !important; }
    .nav-pills .nav-link{ border-radius: 12px; border:1px solid transparent; color: var(--muted); font-weight:600; }
    .nav-pills .nav-link.active{background:linear-gradient(120deg,var(--accent),var(--accent-2)); color:#001018; font-weight:700; box-shadow:0 10px 26px rgba(34,197,94,.22); border-color:transparent;}
    [data-theme="light"] .nav-pills .nav-link.active{color:#fff;}
    .mono{font-variant-numeric:tabular-nums;}
    .section-title{font-weight:700; letter-spacing:.2px; display:flex; align-items:center; gap:8px;}
    .divider{border-color:var(--border); opacity:1;}
    .table-card{border-radius:14px; overflow:hidden;}
  </style>
</head>

<body data-theme="dark">
  <nav class="py-3 mb-3">
    <div class="container nav-glass">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
        <div class="d-flex align-items-center gap-3">
          <div class="d-flex align-items-center justify-content-center" style="width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid var(--border);">
            <i class="bi bi-database fs-4"></i>
          </div>
          <div>
            <div class="fw-bold fs-5">PBS Reseller</div>
            <div class="muted small">Data Transaksi • Google Sheets</div>
          </div>
        </div>

        <div class="d-flex flex-wrap gap-2">
          <div class="pill muted"><i class="bi bi-shield-check"></i> Realtime Sync</div>
          <a class="btn btn-ghost btn-sm" href="./transaksi.html"><i class="bi bi-receipt-cutoff"></i> Transaksi</a>
          <button class="btn btn-ghost btn-sm" id="btnTheme"><i class="bi bi-moon-stars"></i> Theme</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    <div class="glass-strong p-4 mb-3">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-3">
        <div class="section-title"><i class="bi bi-funnel"></i> Filter & Search</div>
        <div class="pill muted" id="status">Siap</div>
      </div>

      <form class="row g-3 align-items-end">
        <div class="col-12 col-md-3">
          <label for="dateFrom" class="form-label small muted mb-1">Dari tanggal</label>
          <input id="dateFrom" type="date" class="form-control form-control-sm">
        </div>
        <div class="col-12 col-md-3">
          <label for="dateTo" class="form-label small muted mb-1">Sampai tanggal</label>
          <input id="dateTo" type="date" class="form-control form-control-sm">
        </div>
        <div class="col-12 col-md-3">
          <label for="q" class="form-label small muted mb-1">Search</label>
          <input id="q" class="form-control form-control-sm" placeholder="Cari order_id / nama / kode / dll">
        </div>
        <div class="col-6 col-md-2">
          <label for="limit" class="form-label small muted mb-1">Limit</label>
          <select id="limit" class="form-select form-select-sm">
            <option>50</option>
            <option selected>200</option>
            <option>500</option>
            <option>1000</option>
          </select>
        </div>
        <div class="col-6 col-md-1 d-grid">
          <button type="button" class="btn btn-sm btn-accent" id="btnLoad">
            <i class="bi bi-arrow-repeat"></i> Load
          </button>
        </div>
      </form>
    </div>

    <ul class="nav nav-pills gap-2 mb-3" id="tabs">
      <li class="nav-item"><button class="nav-link active" data-tab="orderlog">OrderLog</button></li>
      <li class="nav-item"><button class="nav-link" data-tab="orderitems">OrderItems</button></li>
      <li class="nav-item"><button class="nav-link" data-tab="laporanharian">LaporanHarian</button></li>
    </ul>

    <div class="glass p-4">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <div class="fw-bold section-title" id="title">OrderLog</div>
        <span class="badge badge-soft" id="count">0</span>
      </div>

      <div class="table-responsive table-card">
        <table class="table table-sm table-hover align-middle mb-0">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwx2D0fv3Lsjfy7fIwDiGGr-3DdLMArtCJBlxQM-V1YhWiVMoZJ5K0ykPZTywPriADzWA/exec";

    const byId = (id)=>document.getElementById(id);
    const setStatus = (t)=>byId("status").textContent=t;

    let activeTab = "orderlog";

    function toggleTheme(){
      const body = document.body;
      const next = body.getAttribute("data-theme")==="dark" ? "light" : "dark";
      body.setAttribute("data-theme", next);
      byId("btnTheme").innerHTML = next==="dark"
        ? `<i class="bi bi-moon-stars"></i> Theme`
        : `<i class="bi bi-sun"></i> Theme`;
    }

    function fmtCell(v){
      if(v == null) return "";
      const s = String(v);

      // iso date -> tampil jam lokal
      if(/\d{4}-\d{2}-\d{2}T/.test(s)){
        try{
          const d = new Date(s);
          return d.toLocaleString("id-ID");
        }catch(e){ return s; }
      }
      return s;
    }

    async function loadTab(){
      const dateFrom = byId("dateFrom").value;
      const dateTo = byId("dateTo").value;
      const q = byId("q").value.trim();
      const limit = byId("limit").value;

      setStatus("Loading...");

      const url = new URL(API_URL);
      url.searchParams.set("action", activeTab);
      url.searchParams.set("limit", limit);
      if(dateFrom) url.searchParams.set("date_from", dateFrom);
      if(dateTo) url.searchParams.set("date_to", dateTo);
      if(q) url.searchParams.set("q", q);

      const res = await fetch(url.toString());
      const data = await res.json();

      if(!data.ok){
        setStatus("Gagal load data.");
        console.error(data);
        return;
      }

      byId("title").textContent = data.sheet || activeTab;
      byId("count").textContent = `${data.count || 0} baris`;
      setStatus("OK");

      renderTable(data.headers || [], data.rows || []);
    }

    function renderTable(headers, rows){
      const thead = byId("thead");
      const tbody = byId("tbody");

      if(!headers.length){
        thead.innerHTML = "";
        tbody.innerHTML = `<tr><td class="muted">Tidak ada data</td></tr>`;
        return;
      }

      thead.innerHTML = `
        <tr class="muted small">
          ${headers.map(h => `<th>${h}</th>`).join("")}
        </tr>
      `;

      if(!rows.length){
        tbody.innerHTML = `<tr><td colspan="${headers.length}" class="muted">Tidak ada data</td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          ${r.map(c => `<td class="mono">${fmtCell(c)}</td>`).join("")}
        </tr>
      `).join("");
    }

    // tabs
    document.querySelectorAll("#tabs .nav-link").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        document.querySelectorAll("#tabs .nav-link").forEach(x=>x.classList.remove("active"));
        btn.classList.add("active");
        activeTab = btn.dataset.tab;
        loadTab();
      });
    });

    byId("btnLoad").addEventListener("click", loadTab);
    byId("btnTheme").addEventListener("click", toggleTheme);

    // enter untuk search
    byId("q").addEventListener("keydown", (e)=>{ if(e.key==="Enter") loadTab(); });

    // init
    loadTab();
  </script>
</body>
</html>
