<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PBS Reseller — Data</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root{
      --bg:#0b1220; --card:rgba(255,255,255,.06); --border:rgba(255,255,255,.12);
      --text:#e5e7eb; --muted:#a3a3a3; --accent:#22d3ee;
    }
    [data-theme="light"]{
      --bg:#f6f7fb; --card:rgba(0,0,0,.04); --border:rgba(0,0,0,.10);
      --text:#0f172a; --muted:#475569; --accent:#4c1d95;
    }
    body{background:var(--bg); color:var(--text);}
    .glass{background:var(--card); border:1px solid var(--border); border-radius:16px; backdrop-filter:blur(10px);}
    .muted{color:var(--muted)!important;}
    .form-control,.form-select{background:transparent!important; color:var(--text)!important; border-color:var(--border)!important;}
    .table > :not(caption) > * > *{background:transparent!important; color:var(--text)!important; border-color:var(--border)!important;}
    .nav-pills .nav-link.active{background:var(--accent); color:#001018; font-weight:700;}
    [data-theme="light"] .nav-pills .nav-link.active{color:#fff;}
    .badge-soft{background:rgba(34,211,238,.15); border:1px solid rgba(34,211,238,.25); color:var(--text);}
    .mono{font-variant-numeric:tabular-nums;}
  </style>
</head>

<body data-theme="dark">
  <nav class="py-3 mb-3">
    <div class="container d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-database fs-4"></i>
        <div>
          <div class="fw-bold">PBS Reseller</div>
          <div class="muted small">Data Transaksi (Google Sheets)</div>
        </div>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-light btn-sm" href="./transaksi.html"><i class="bi bi-receipt-cutoff"></i> Transaksi</a>
        <button class="btn btn-outline-light btn-sm" id="btnTheme"><i class="bi bi-moon-stars"></i> Theme</button>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    <div class="glass p-3 mb-3">
      <form class="row g-2 align-items-end justify-content-between flex-wrap">
      <div class="col-auto">
        <label for="dateFrom" class="form-label small muted mb-1">Dari tanggal</label>
        <input id="dateFrom" type="date" class="form-control form-control-sm">
      </div>
      <div class="col-auto">
        <label for="dateTo" class="form-label small muted mb-1">Sampai tanggal</label>
        <input id="dateTo" type="date" class="form-control form-control-sm">
      </div>
      <div class="col-auto">
        <label for="q" class="form-label small muted mb-1">Search</label>
        <input id="q" class="form-control form-control-sm" placeholder="Cari order_id / nama / kode / dll">
      </div>
      <div class="col-auto">
        <label for="limit" class="form-label small muted mb-1">Limit</label>
        <select id="limit" class="form-select form-select-sm">
        <option>50</option>
        <option selected>200</option>
        <option>500</option>
        <option>1000</option>
        </select>
      </div>
      <div class="col-auto">
        <button type="button" class="btn btn-sm btn-primary w-100" id="btnLoad">
        <i class="bi bi-arrow-repeat"></i> Load
        </button>
      </div>
      <div class="col-auto ms-auto text-end">
        <div class="muted small" id="status">Siap</div>
      </div>
      </form>
    </div>

    <ul class="nav nav-pills gap-2 mb-3" id="tabs">
      <li class="nav-item"><button class="nav-link active" data-tab="orderlog">OrderLog</button></li>
      <li class="nav-item"><button class="nav-link" data-tab="orderitems">OrderItems</button></li>
      <li class="nav-item"><button class="nav-link" data-tab="laporanharian">LaporanHarian</button></li>
    </ul>

    <div class="glass p-3">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <div class="fw-bold" id="title">OrderLog</div>
        <span class="badge badge-soft" id="count">0</span>
      </div>

      <div class="table-responsive">
        <table class="table table-sm align-middle">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwx2D0fv3Lsjfy7fIwDiGGr-3DdLMArtCJBlxQM-V1YhWiVMoZJ5K0ykPZTywPriADzWA/exec";

    const byId = (id)=>document.getElementById(id);
    const setStatus = (t)=>byId("status").textContent=t;

    let activeTab = "orderlog";

    function toggleTheme(){
      const body = document.body;
      const next = body.getAttribute("data-theme")==="dark" ? "light" : "dark";
      body.setAttribute("data-theme", next);
      byId("btnTheme").innerHTML = next==="dark"
        ? `<i class="bi bi-moon-stars"></i> Theme`
        : `<i class="bi bi-sun"></i> Theme`;
    }

    function fmtCell(v){
      if(v == null) return "";
      const s = String(v);

      // iso date -> tampil jam lokal
      if(/\d{4}-\d{2}-\d{2}T/.test(s)){
        try{
          const d = new Date(s);
          return d.toLocaleString("id-ID");
        }catch(e){ return s; }
      }
      return s;
    }

    async function loadTab(){
      const dateFrom = byId("dateFrom").value;
      const dateTo = byId("dateTo").value;
      const q = byId("q").value.trim();
      const limit = byId("limit").value;

      setStatus("Loading...");

      const url = new URL(API_URL);
      url.searchParams.set("action", activeTab);
      url.searchParams.set("limit", limit);
      if(dateFrom) url.searchParams.set("date_from", dateFrom);
      if(dateTo) url.searchParams.set("date_to", dateTo);
      if(q) url.searchParams.set("q", q);

      const res = await fetch(url.toString());
      const data = await res.json();

      if(!data.ok){
        setStatus("Gagal load data.");
        console.error(data);
        return;
      }

      byId("title").textContent = data.sheet || activeTab;
      byId("count").textContent = `${data.count || 0} baris`;
      setStatus("OK");

      renderTable(data.headers || [], data.rows || []);
    }

    function renderTable(headers, rows){
      const thead = byId("thead");
      const tbody = byId("tbody");

      if(!headers.length){
        thead.innerHTML = "";
        tbody.innerHTML = `<tr><td class="muted">Tidak ada data</td></tr>`;
        return;
      }

      thead.innerHTML = `
        <tr class="muted small">
          ${headers.map(h => `<th>${h}</th>`).join("")}
        </tr>
      `;

      if(!rows.length){
        tbody.innerHTML = `<tr><td colspan="${headers.length}" class="muted">Tidak ada data</td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          ${r.map(c => `<td class="mono">${fmtCell(c)}</td>`).join("")}
        </tr>
      `).join("");
    }

    // tabs
    document.querySelectorAll("#tabs .nav-link").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        document.querySelectorAll("#tabs .nav-link").forEach(x=>x.classList.remove("active"));
        btn.classList.add("active");
        activeTab = btn.dataset.tab;
        loadTab();
      });
    });

    byId("btnLoad").addEventListener("click", loadTab);
    byId("btnTheme").addEventListener("click", toggleTheme);

    // enter untuk search
    byId("q").addEventListener("keydown", (e)=>{ if(e.key==="Enter") loadTab(); });

    // init
    loadTab();
  </script>
</body>
</html>
